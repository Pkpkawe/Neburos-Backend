[pytest]
#basic
testpaths=src/tests/
python_files=*_tests.py test_*.py
python_classes= Test* *Test
python_functions= test_* *_test

#marks
markers = 
    forceError: funções com erro
    endpoint: testes de endpoints da api
    

addopts = -m "not forceError"

#logs
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)2s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)2s] %(message)s (%(filename)s:%(lineno)s)
log_file_date_format = %Y-%m-%d %H:%M:%S

#assertions
assertion_text_diff_style = ndiff
verbosity_assertions = 5